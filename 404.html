  <source src="assets/sounds/splat.wav" type="audio/wav">

<!-- Scripts -->
<script>
    window.addEventListener("scroll", function () {
        document.body.style.backgroundPosition = `${window.scrollY * 0.2}px ${window.scrollY * 0.2}px`; 
    });
    /* evil avatar kill function */
    function avatarSplat() {
        let avatar = document.getElementById("avatar");
        avatar.src = "assets/images/avatar_splat.png"
        avatar.onclick = "";
        avatar.style.cursor = "default";

        let sfx = document.getElementById("splatsfx");
        sfx.volume = 0.3;
        sfx.play();

        let scale = 98;
        id = setInterval(frame, 10);
        function frame() {
            if (scale == 110) {
                clearInterval(id);
            } else {
                scale++; 
                avatar.style.scale = scale + '%'; 
            }
        }
    }
</script>
